name: C++ Gateway CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libhiredis-dev pkg-config

    - name: Configure CMake
      run: |
        mkdir -p build_cmake
        cd build_cmake
        cmake -DCMAKE_BUILD_TYPE=Release ..

    - name: Build Gateway
      run: |
        cd build_cmake
        make -j$(nproc) gateway

    - name: Build Docker Image
      run: |
        docker build -t throttlr-gateway:latest .
