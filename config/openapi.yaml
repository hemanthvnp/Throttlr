# Example OpenAPI (Swagger) YAML for the gateway
openapi: 3.0.0
info:
  title: Advanced C++ API Gateway
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/resource:
    get:
      summary: Get resource
      responses:
        '200':
          description: Success
        '429':
          description: Rate limit exceeded
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Prometheus metrics
