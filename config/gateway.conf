PORT=8080
BACKENDS=3
# Rate limiting configuration
# Format: ENDPOINT:USER:MAX_REQUESTS:WINDOW_SECONDS
RATE_LIMIT=/api/v1/resource:default:100:10
RATE_LIMIT=/api/v1/resource:premium:1000:10
RATE_LIMIT=/api/v1/other:default:50:10
# Storage backend for rate limiter: file or redis
RATE_LIMIT_STORAGE=file
RATE_LIMIT_LOGGING=on
