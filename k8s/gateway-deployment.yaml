apiVersion: apps/v1
kind: Deployment
metadata:
  name: throttlr-gateway
  labels:
    app: throttlr-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: throttlr-gateway
  template:
    metadata:
      labels:
        app: throttlr-gateway
    spec:
      containers:
      - name: gateway
        image: throttlr-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: throttlr-gateway-service
spec:
  type: LoadBalancer
  selector:
    app: throttlr-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
